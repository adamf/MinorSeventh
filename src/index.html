<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Minor Seventh - Free ear training app for learning musical intervals">
  <meta name="theme-color" content="#3b82f6">
  <title>Minor Seventh: Free Ear Training</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 text-white font-sans antialiased">
  <div id="app" class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="py-6 px-4 text-center bg-black/20 backdrop-blur-sm border-b border-white/10">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
        Minor Seventh
      </h1>
      <p class="text-lg text-blue-200 mt-2">Free Ear Training</p>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-start px-4 py-6 max-w-4xl mx-auto w-full">
      
      <!-- Mode Toggle -->
      <div id="mode-toggle" class="inline-flex rounded-xl bg-white/10 backdrop-blur-sm p-1 mb-6">
        <button 
          id="quiz-mode-btn" 
          class="mode-btn active px-6 py-3 rounded-lg text-sm font-semibold transition-all duration-200"
          data-mode="quiz"
        >
          🎯 Interval Quiz
        </button>
        <button 
          id="trainer-mode-btn" 
          class="mode-btn px-6 py-3 rounded-lg text-sm font-semibold transition-all duration-200"
          data-mode="trainer"
        >
          🎹 Interval Training
        </button>
      </div>

      <!-- Quiz Mode Section -->
      <section id="quiz-section" class="w-full">
        <!-- Play Button & Status -->
        <div class="text-center mb-8">
          <button 
            id="play-btn" 
            class="play-button group relative w-48 h-48 md:w-56 md:h-56 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 hover:from-blue-400 hover:to-purple-500 shadow-2xl shadow-blue-500/30 hover:shadow-blue-400/40 transform hover:scale-105 active:scale-95 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
          >
            <span class="text-4xl md:text-5xl font-bold text-white drop-shadow-lg">
              ▶ Play
            </span>
            <div class="absolute inset-0 rounded-full bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity duration-200"></div>
          </button>
        </div>

        <div id="results" class="text-center text-xl text-blue-200 mb-4">
          Click 'Play' to begin training.
        </div>
        
        <div id="score" class="text-center text-lg text-blue-300/80 mb-6">
          <span id="correct-count">0</span> correct out of <span id="total-count">0</span> guesses
        </div>

        <div id="interval-info" class="text-center text-blue-100/90 mb-8 px-4 min-h-[3rem]"></div>

        <!-- Answer Buttons Grid -->
        <div id="answers" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 mb-8">
          <!-- Answer buttons will be generated by JS -->
        </div>

        <div class="flex justify-center">
          <button 
            id="show-answer-btn" 
            class="px-6 py-3 rounded-xl bg-yellow-500/20 hover:bg-yellow-500/30 text-yellow-300 font-semibold border border-yellow-500/30 transition-all duration-200"
          >
            💡 Show Answer
          </button>
        </div>
      </section>

      <!-- Trainer Mode Section (Hidden by default) -->
      <section id="trainer-section" class="w-full hidden">
        <div class="text-center mb-8">
          <p class="text-xl text-blue-200">Press any interval to hear it played.</p>
        </div>

        <div id="interval-info-trainer" class="text-center text-blue-100/90 mb-8 px-4 min-h-[3rem]"></div>

        <div id="trainer-buttons" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
          <!-- Trainer buttons will be generated by JS -->
        </div>
      </section>

      <!-- Options Panel -->
      <div class="w-full mt-8 p-6 rounded-2xl bg-white/5 backdrop-blur-sm border border-white/10">
        <h3 class="text-lg font-semibold text-blue-200 mb-4 text-center">⚙️ Options</h3>
        
        <div class="flex flex-col sm:flex-row gap-6 justify-center items-center">
          <!-- Arpeggio Toggle -->
          <div class="flex flex-col items-center gap-2">
            <span class="text-sm text-blue-300">Play Arpeggios</span>
            <div class="toggle-group inline-flex rounded-lg bg-white/10 p-1">
              <button 
                id="arpeggio-on" 
                class="toggle-btn active px-4 py-2 rounded-md text-sm font-medium transition-all"
                data-value="on"
              >
                On
              </button>
              <button 
                id="arpeggio-off" 
                class="toggle-btn px-4 py-2 rounded-md text-sm font-medium transition-all"
                data-value="off"
              >
                Off
              </button>
            </div>
          </div>

          <!-- Direction Toggle -->
          <div class="flex flex-col items-center gap-2">
            <span class="text-sm text-blue-300">Interval Direction</span>
            <div class="toggle-group inline-flex rounded-lg bg-white/10 p-1">
              <button 
                id="direction-up" 
                class="toggle-btn active px-4 py-2 rounded-md text-sm font-medium transition-all"
                data-value="up"
              >
                ⬆️ Ascending
              </button>
              <button 
                id="direction-down" 
                class="toggle-btn px-4 py-2 rounded-md text-sm font-medium transition-all"
                data-value="down"
              >
                ⬇️ Descending
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="py-4 px-4 text-center text-sm text-blue-300/60 border-t border-white/10">
      <p>
        © 2010-2024 Adam Fletcher | 
        <a href="mailto:feedback@minorseventh.com" class="hover:text-blue-300 transition-colors">Submit Feedback</a> | 
        <a href="https://github.com/adamf/MinorSeventh" class="hover:text-blue-300 transition-colors">Get The Source</a>
      </p>
    </footer>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
